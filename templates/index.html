<!DOCTYPE html>
<html lang="en" data-theme="INK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GradeView / Overview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root[data-theme="INK"] {
  --bg: #0A0A0A;
  --surface: #111111;
  --surface-2: #171717;
  --border: rgba(255,255,255,0.07);
  --border-focus: rgba(255,255,255,0.2);
  --text-1: #F2F2F2;
  --text-2: #666666;
  --text-3: #3A3A3A;
  --accent: #C8FF57;
  --accent-dim: rgba(200,255,87,0.1);
  --danger: #FF4D4D;
  --danger-dim: rgba(255,77,77,0.1);
  --warn: #F5A623;
  --neutral: #F2F2F2;
  --chart-line: #C8FF57;
  --chart-fill: rgba(200,255,87,0.06);
}

:root[data-theme="PAPER"] {
  --bg: #F4F3EF;
  --surface: #FFFFFF;
  --surface-2: #F9F8F5;
  --border: #E2DED8;
  --border-focus: #AAAAAA;
  --text-1: #111111;
  --text-2: #888888;
  --text-3: #C8C4BE;
  --accent: #1A1AFF;
  --accent-dim: rgba(26,26,255,0.08);
  --danger: #CC2222;
  --danger-dim: rgba(204,34,34,0.08);
  --warn: #B07000;
  --neutral: #111111;
  --chart-line: #1A1AFF;
  --chart-fill: rgba(26,26,255,0.05);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--text-1);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}

.mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
.section-label { font-family: 'Inter'; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); }

/* Layout */
.topbar {
  height: 40px; width: 100%; border-bottom: 1px solid var(--border); background: var(--bg);
  display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
}
.topbar-left { font-size: 12px; color: var(--text-2); }
.topbar-left span { color: var(--text-1); }
.topbar-right { display: flex; gap: 12px; align-items: center; font-size: 12px; color: var(--text-2); }
.topbar-btn { cursor: pointer; color: var(--text-2); background: none; border: none; font-size: 12px; }

.main-layout { display: flex; flex: 1; overflow: hidden; }

.sidebar {
  width: 220px; border-right: 1px solid var(--border); background: var(--bg); padding: 24px 0;
  display: flex; flex-direction: column; position: sticky; height: 100%;
}
.logo-block { padding: 0 20px 24px; }
.logo-monogram { font-family: 'JetBrains Mono'; font-size: 28px; font-weight: 600; color: var(--accent); }
.logo-text { font-size: 10px; text-transform: uppercase; color: var(--text-1); margin-top: 4px; }

.nav-links { display: flex; flex-direction: column; margin-top: 24px; }
.nav-link {
  height: 36px; padding: 0 20px; display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text-2); cursor: pointer; border-left: 2px solid transparent;
}
.nav-link:hover { color: var(--text-1); background: var(--surface-2); }
.nav-link.active { border-left-color: var(--accent); background: var(--surface); color: var(--text-1); }

.sidebar-divider { border-top: 1px solid var(--border); margin: 20px 0; }
.cycle-toggle { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
.cycle-controls { font-family: 'JetBrains Mono'; font-size: 12px; text-align: center; color: var(--text-1); cursor: pointer; }

.gpa-terminal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  margin: auto 12px 12px; padding: 12px;
}
.gpa-label { font-size: 10px; text-transform: uppercase; color: var(--text-2); }
.gpa-val { font-size: 28px; font-weight: 600; color: var(--text-1); margin: 4px 0; }
.gpa-trend { font-size: 11px; color: var(--accent); }

.center-content { flex: 1; overflow-y: auto; padding: 0 40px 40px; }
.status-bar { padding: 20px 0; font-size: 12px; color: var(--text-2); }

.course-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
.course-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  padding: 18px 20px; cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 150ms ease, background 150ms ease; display:flex; flex-direction: column;
}
.course-card:hover { border-color: var(--border-focus); background: var(--surface-2); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.card-code { font-size: 11px; color: var(--text-2); }
.card-name { font-size: 13px; font-weight: 500; font-family: Inter; margin-top: 2px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22C55E; }
.card-grade { font-size: 34px; font-weight: 600; font-family: 'JetBrains Mono'; margin-top: 16px; }

.right-panel {
  width: 260px; border-left: 1px solid var(--border); background: var(--bg); padding: 20px 16px; position: sticky; height: 100%;
}
.right-panel-header { display: flex; justify-content: space-between; align-items: center; }
.stat-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.stat-val { font-size: 22px; font-weight: 500; color: var(--text-1); margin-top: 4px; }
.stat-sub { font-size: 11px; color: var(--text-2); margin-top: 2px; }

</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">GradeView / <span>Overview</span></div>
  <div class="topbar-right">
    <button class="topbar-btn" onclick="refresh()">↻ Refresh</button> |
    <button class="topbar-btn" onclick="logout()">Sign out</button>
    <button class="topbar-btn" onclick="toggleTheme()">☀️ Toggle Theme</button>
  </div>
</div>
<div class="main-layout" id="app">
  <div class="sidebar">
    <div class="logo-block">
      <div class="logo-monogram">GV</div>
      <div class="logo-text">GradeView</div>
    </div>
    <div class="nav-links">
      <div class="nav-link active">Overview</div>
      <div class="nav-link">What If</div>
      <div class="nav-link">GPA Simulator</div>
      <div class="nav-link">Report Card</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="cycle-toggle">
      <span class="section-label">THIS CYCLE</span>
      <div class="cycle-controls">&larr; Cycle <span id="cycle-num">5</span> &rarr;</div>
    </div>
    <div class="gpa-terminal">
      <div class="gpa-label">GPA</div>
      <div class="gpa-val mono" id="gpa-val">0.00</div>
      <div class="gpa-trend mono">&uarr; 0.00 this cycle</div>
    </div>
  </div>
  
  <div class="center-content">
    <div class="status-bar mono" id="status-bar">Syncing...</div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div class="section-label">ACTIVE COURSES &mdash; CYCLE 5</div>
      <div class="mono" style="font-size:11px; color:var(--text-2);">[ Cycle 5 &blacktriangledown; ]</div>
    </div>
    <div class="course-grid" id="course-grid">
      <!-- Generated via JS -->
    </div>
  </div>
  
  <div class="right-panel">
    <div class="right-panel-header">
      <div class="section-label">QUICK STATS</div>
      <button class="topbar-btn">&rsaquo;</button>
    </div>
    <div id="stats-list">
      <div class="stat-item">
        <div class="section-label">OVERALL AVG</div>
        <div class="stat-val mono" id="overall-avg">--%</div>
      </div>
      <div class="stat-item">
        <div class="section-label">HIGHEST</div>
        <div class="stat-val mono" id="highest-grade">--%</div>
      </div>
      <div class="stat-item">
        <div class="section-label">LOWEST</div>
        <div class="stat-val mono" id="lowest-grade">--%</div>
      </div>
    </div>
  </div>
</div>


<!-- Login Overlay -->
<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9999; display:flex; justify-content:center; align-items:center;">
    <div style="background:var(--surface); padding:40px; border:1px solid var(--border); border-radius:4px; width:340px;">
        <div class="logo-monogram" style="text-align:center; font-size:36px; margin-bottom: 24px;">GV</div>
        <form id="login-form">
            <input type="text" id="username" placeholder="HAC Username" required style="width:100%; margin-bottom:12px; padding:10px 12px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-1); font-family:Inter; border-radius:4px;">
            <input type="password" id="password" placeholder="HAC Password" required style="width:100%; margin-bottom:20px; padding:10px 12px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-1); font-family:Inter; border-radius:4px;">
            <button type="submit" style="width:100%; padding:12px; background:var(--text-1); color:var(--bg); border:none; border-radius:4px; font-weight:600; cursor:pointer;" id="login-btn">Sign In</button>
            <div id="login-error" style="color:var(--danger); margin-top:12px; font-size:12px; text-align:center;"></div>
        </form>
    </div>
</div>

<!-- Assignments Modal -->
<div id="assignments-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9998; display:none; justify-content:center; align-items:center; backdrop-filter:blur(4px);">
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:4px; width:80%; max-width:700px; max-height:80vh; display:flex; flex-direction:column;">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <h2 id="modal-course-title" style="font-family:Inter; font-size:18px; font-weight:600;">Course</h2>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--text-2); cursor:pointer; font-size:24px;">&times;</button>
        </div>
        <div id="modal-assignments-list" style="padding:20px; overflow-y:auto; flex:1; font-family:'JetBrains Mono'; font-size:12px;">
            Loading...
        </div>
    </div>
</div>

<script>
  let theme = 'INK';
  let sessionId = localStorage.getItem('sessionId') || null;
  let allGradesData = [];

  function toggleTheme() {
    theme = theme === 'INK' ? 'PAPER' : 'INK';
    document.documentElement.setAttribute('data-theme', theme);
  }

  // Auth logic
  if(sessionId) {
      document.getElementById('login-overlay').style.display = 'none';
      fetchGrades();
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Authenticating...';
      
      try {
          const res = await fetch('/api/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username:u, password:p })
          });
          const data = await res.json();
          if(!res.ok) throw new Error(data.error || 'Login failed');
          
          sessionId = data.session_id;
          localStorage.setItem('sessionId', sessionId);
          localStorage.setItem('cachedUsername', u);
          localStorage.setItem('cachedPassword', p);
          
          document.getElementById('login-overlay').style.display = 'none';
          fetchGrades();
      } catch(err) {
          document.getElementById('login-error').textContent = err.message;
      } finally {
          btn.textContent = 'Sign In';
      }
  });

  async function fetchWithAuth(url, options = {}) {
      if(!options.headers) options.headers = {};
      options.headers['X-Session-ID'] = sessionId;
      let res = await fetch(url, options);
      if(res.status === 401) {
          // auto reauth
          const u = localStorage.getItem('cachedUsername');
          const p = localStorage.getItem('cachedPassword');
          if(u && p) {
              const loginRes = await fetch('/api/login', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ username:u, password:p })
              });
              const loginData = await loginRes.json();
              if(loginData.session_id) {
                  sessionId = loginData.session_id;
                  localStorage.setItem('sessionId', sessionId);
                  options.headers['X-Session-ID'] = sessionId;
                  res = await fetch(url, options);
              } else { logout(); }
          } else { logout(); }
      }
      return res;
  }

  async function fetchGrades(cycle = '') {
      document.getElementById('status-bar').innerText = 'Syncing...';
      const url = cycle ? `/api/grades?cycle=${encodeURIComponent(cycle)}` : `/api/grades`;
      try {
          const res = await fetchWithAuth(url);
          const data = await res.json();
          if(!res.ok) throw new Error(data.error);
          
          updateUI(data);
      } catch(err) {
          console.error(err);
          document.getElementById('status-bar').innerText = 'Error syncing grades';
      }
  }

  function updateUI(data) {
      allGradesData = data.grades || [];
      const grid = document.getElementById('course-grid');
      grid.innerHTML = '';
      
      let highest = -1, lowest = 200, total = 0, count = 0;
      let highestName = '', lowestName = '';

      allGradesData.forEach(c => {
          if(c.numeric_grade !== null) {
              const g = parseFloat(c.numeric_grade);
              total += g; count++;
              if(g > highest) { highest = g; highestName = c.course_name; }
              if(g < lowest) { lowest = g; lowestName = c.course_name; }
          }
          
          const gStr = c.numeric_grade !== null ? `${c.numeric_grade}%` : '--%';
          const colorClass = c.numeric_grade !== null && c.numeric_grade < 70 ? 'var(--danger)' : 'var(--text-1)';
          
          grid.innerHTML += `
            <div class="course-card" onclick="openAssignments('${c.course_id}', '${c.course_name}')">
              <div class="card-top">
                <div>
                  <div class="card-code mono">${c.course_id}</div>
                  <div class="card-name">${c.course_name}</div>
                </div>
                <div class="status-dot" style="background:${c.last_updated && c.last_updated.toLowerCase() === 'just now' ? '#22C55E' : 'var(--text-3)'}"></div>
              </div>
              <div class="card-grade mono" style="color: ${colorClass};">${gStr}</div>
              <div class="card-code mono" style="margin-top:auto; font-size:10px; color:var(--text-3); text-align:right;">Updated: ${c.last_updated || 'Unknown'}</div>
            </div>
          `;
      });
      
      let avg = count > 0 ? (total/count).toFixed(2) : 0;
      
      document.getElementById('overall-avg').innerText = avg + '%';
      document.getElementById('highest-grade').innerText = highest === -1 ? '--%' : (highest + '%');
      document.getElementById('lowest-grade').innerText = lowest === 200 ? '--%' : (lowest + '%');
      
      document.getElementById('status-bar').innerText = `${avg}% overall · ${count} courses · cycle ${data.current_cycle || 5} · synced`;
      
      if(data.current_cycle) {
          document.getElementById('cycle-num').innerText = data.current_cycle;
      }
  }

  async function openAssignments(courseId, courseName) {
      document.getElementById('assignments-modal').style.display = 'flex';
      document.getElementById('modal-course-title').innerText = courseName;
      document.getElementById('modal-assignments-list').innerHTML = 'Loading assignments...';
      
      try {
          const res = await fetchWithAuth(`/api/assignments/${encodeURIComponent(courseId)}`);
          const data = await res.json();
          if(!res.ok) throw new Error(data.error);
          
          let html = `<table style="width:100%; border-collapse:collapse; text-align:left;">`;
          html += `<tr style="border-bottom:1px solid var(--border); color:var(--text-2);">
                      <th style="padding:8px;">Date</th>
                      <th style="padding:8px;">Assignment</th>
                      <th style="padding:8px;">Category</th>
                      <th style="padding:8px;">Points</th>
                      <th style="padding:8px;">Score</th>
                   </tr>`;
          
          if(!data.categories || data.categories.length === 0) {
              html += `<tr><td colspan="5" style="padding:8px; text-align:center;">No assignments found</td></tr>`;
          } else {
              data.categories.forEach(cat => {
                  html += `<tr style="background:var(--surface-2); border-bottom:1px solid var(--border);"><td colspan="5" style="padding:8px; font-weight:600; font-family:Inter; font-size:11px; text-transform:uppercase;">${cat.name} (${cat.weight})</td></tr>`;
                  cat.assignments.forEach(a => {
                      html += `
                        <tr style="border-bottom:1px solid var(--border); border-top:1px solid var(--border);">
                          <td style="padding:8px; color:var(--text-2);">${a.date_due || '--'}</td>
                          <td style="padding:8px; color:var(--text-1); max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${a.name}</td>
                          <td style="padding:8px; color:var(--text-2);">${a.category || '--'}</td>
                          <td style="padding:8px; color:var(--text-2);">${a.points || '--'}</td>
                          <td style="padding:8px; color:var(--text-1);">${a.score || '--'}</td>
                        </tr>
                      `;
                  });
              });
          }
          html += '</table>';
          document.getElementById('modal-assignments-list').innerHTML = html;
      } catch(err) {
          document.getElementById('modal-assignments-list').innerHTML = `<div style="color:var(--danger)">Error: ${err.message}</div>`;
      }
  }

  function closeModal() {
      document.getElementById('assignments-modal').style.display = 'none';
  }

  async function refresh() {
      document.getElementById('status-bar').innerText = 'Refreshing all cycles...';
      try {
          const res = await fetchWithAuth('/api/refresh_all_cycles', { method: 'POST' });
          if(!res.ok) throw new Error('Refesh failed');
          fetchGrades();
      } catch(err) {
          console.error(err);
          document.getElementById('status-bar').innerText = 'Refresh failed';
      }
  }

  function logout() {
      sessionId = null;
      localStorage.removeItem('sessionId');
      localStorage.removeItem('cachedUsername');
      localStorage.removeItem('cachedPassword');
      document.getElementById('login-overlay').style.display = 'flex';
      document.getElementById('course-grid').innerHTML = '';
  }
</script>
</body>
</html>
